<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Drill 1</title> 

    <style>
        body{
            background-color: bisque;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container-fluid{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }

        h1{
            font-size: 30px;
            font-weight: bold;
        }
        
        #box{
            width: 575px;
            background-color: #1a1d23;
            display: flex;
            align-items: center;
            padding: 15px;
            border-radius: 20px;
            gap: 50px
        }

        b{
            color: white;
        }

        input{
            border-radius: 5px;
            padding: 10px;
            width: 100%;
        }
        
        img{
            display: block;
            height: 50px; 
            width: auto;
            border-radius: 100px;
        }
    </style>
</head> 
<body>
    <div class="container-fluid">
        <h1>Electricity Consumption Classifier</h1>
        <br>

        <div id="box">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSHZ6oTTdi1oSh_pRZW7VdYonCoHyFW4cRaRg&s" alt="meralcologo" href="https://company.meralco.com.ph/meralco-online">
            <b>kWh</b>
            <input id="kwh" placeholder="Input kilowatt per hour">
            <button class="btn btn-warning" onclick="checkKwh()">Consumption <br> Classification</button>
        </div>  
    </div>

    <script>
        function checkKwh (){
            var kWh = document.getElementById("kwh").value;
            var A = "Lifeline Consumer";
            var B = "Low Consumption";
            var C = "Average Consumption";
            var D = "High Consumption";
            var E = "Very High Consumption";

            if (isNaN(kWh) || kWh < 0) {
                alert("Please assign a valid number.")
            }

            else if(kWh <=100){
                alert(A + ": Discounted electricity rates");
            }

            else if(kWh <= 200){
                alert(B + ": Normal residential rates");
            }
           
            else if(kWh <= 300){
                alert(C + ": Typical electricity usage");
            }

            else if(kWh <= 500){
                alert(D + ": Higher electricity usage");
            }

            else{
                alert(E + ": Heavy electricity users");
            }
        }
    </script>
</body>  
</html>
