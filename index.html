<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Drill 1</title> 

    <style>
        
    </style>
</head> 
<body>
    <div class="container-fluid">
        <h1>Check Consumption Classification</h1>

        <br>

        <div class="row">
            <div class="col-sm-1">
                <input id="kwh" class="form-control">
            </div>

            <div>
            <button class="btn btn-info" onclick="checkKwh()">Consumption Classification</button>
        </div>
        </div>
    </div>

    <script>
        function checkKwh (){
            var kWh = document.getElementById("kwh").value;
            var A = "Lifeline Consumer";
            var B = "Low Consumption";
            var C = "Average Consumption";
            var D = "High Consumption";
            var E = "Very High Consumption";

            if (isNaN(kWh) || kWh < 0) {
                alert("Please assign a valid number.")
            }

            else if(kWh <=100){
                alert(A + ": Discounted electricity rates");
            }

            else if(kWh <= 200){
                alert(B + ": Normal residential rates");
            }
           
            else if(kWh <= 300){
                alert(C + ": Typical electricity usage");
            }

            else if(kWh <= 500){
                alert(D + ": Higher electricity usage");
            }

            else{
                alert(E + ": Heavy electricity users");
            }
        }
    </script>
</body>  
</html>
